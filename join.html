<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join a PollSlide session</title>
<meta name="description" content="Join a live PollSlide session from any device — enter the code shown next to the QR on the presenter's slide.">
<!-- Short, memorable join URL for people without a phone to scan the QR.
     pollslide.com/join → the answer page (which shows a "enter the code" screen).
     A code in the hash is preserved: pollslide.com/join#ABC123 → straight into that session. -->
<link rel="canonical" href="https://app.pollslide.com/answer">
<meta http-equiv="refresh" content="0; url=https://app.pollslide.com/answer">
<script>location.replace('https://app.pollslide.com/answer' + (location.hash || ''));</script>
<style>
  html,body{height:100%;margin:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07070f;color:#f4f4fc;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
  a{color:#6c63ff;font-weight:600;}
</style>
</head>
<body>
  <div>
    <p>Taking you to PollSlide…</p>
    <p>If nothing happens, <a href="https://app.pollslide.com/answer">tap here to enter your code</a>.</p>
  </div>
</body>
</html>
